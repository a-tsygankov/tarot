name: Deploy Tarot

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'shared/**'
      - 'workers/**'
  workflow_dispatch:

# ── Client (GitHub Pages) ──────────────────────────────────────────

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── Deploy client to GitHub Pages ──
  deploy-client:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Type check
        working-directory: client
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: client
        run: npm test

      - name: Build
        working-directory: client
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Deploy worker to Cloudflare ──
  deploy-worker:
    runs-on: ubuntu-latest
    # Only run if secrets are configured
    if: vars.CLOUDFLARE_ACCOUNT_ID != '' || true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/tarot-api/package-lock.json

      - name: Install dependencies
        working-directory: workers/tarot-api
        run: npm ci

      - name: Type check
        working-directory: workers/tarot-api
        run: npx tsc --noEmit

      - name: Deploy to Cloudflare Workers
        working-directory: workers/tarot-api
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-tts-assets:
    runs-on: ubuntu-latest
    if: vars.CLOUDFLARE_ACCOUNT_ID != '' || true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: workers/tts-assets/package-lock.json

      - name: Install dependencies
        working-directory: workers/tts-assets
        run: npm ci

      - name: Type check
        working-directory: workers/tts-assets
        run: npx tsc --noEmit

      - name: Deploy tts-assets to Cloudflare Workers
        working-directory: workers/tts-assets
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
